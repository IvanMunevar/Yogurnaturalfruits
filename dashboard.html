<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Yogur Natural Fruits</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/sidebar.css">

    <style>
/* DASHBOARD - ESTILOS ESPECIFICOS */ 

/* CARDS METRICAS*/ 

       .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-left: 4px solid #23899e;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 16px rgba(35,137,158,0.15); }

        .card-icon { font-size: 22px; }

        .card h3 {
            font-size: 13px;
            color: #888;
            font-weight: 500;
            margin: 0;
        }

        .card-valor {
            font-size: 26px;
            font-weight: 700;
            color: #2c3e50;
            margin: 0;
        }

        .card-delta {
            font-size: 12px;
            font-weight: 600;
        }
        .delta-up   { color: #1a7a4a; }
        .delta-down { color: #c0392b; }

        /* Colores borde por tipo */
        .card-ventas    { border-left-color: #23899e; }
        .card-productos { border-left-color: #27ae60; }
        .card-insumos   { border-left-color: #f39c12; }
        .card-alertas   { border-left-color: #e74c3c; }

        /* ---- SECCIÓN DOS COLUMNAS ---- */
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .dash-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .dash-panel-title {
            font-size: 15px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ---- VENTAS RECIENTES ---- */
        .venta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .venta-item:last-child { border-bottom: none; }

        .venta-info { display: flex; flex-direction: column; gap: 2px; }
        .venta-nombre { font-size: 14px; font-weight: 600; color: #2c3e50; }
        .venta-meta   { font-size: 12px; color: #aaa; }

        .venta-derecha { text-align: right; }
        .venta-monto   { font-size: 14px; font-weight: 700; color: #23899e; }
        .venta-cant    { font-size: 12px; color: #aaa; }

        /* ---- STOCK BAJO (alertas) ---- */
        .stock-item {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .stock-item:last-child { border-bottom: none; }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .stock-nombre { font-size: 14px; font-weight: 600; color: #2c3e50; }
        .stock-unidades { font-size: 12px; color: #e74c3c; font-weight: 600; }

        .barra-fondo {
            height: 6px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .barra-fill {
            height: 100%;
            border-radius: 10px;
            background: #e74c3c;
            transition: width 0.5s ease;
        }
        .stock-minimo {
            font-size: 11px;
            color: #bbb;
            margin-top: 4px;
        }

        /* ---- STOCK INSUMOS (tabla simple) ---- */
        .insumos-lista {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .insumos-lista th {
            text-align: left;
            color: #aaa;
            font-weight: 600;
            font-size: 12px;
            padding: 0 0 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .insumos-lista td {
            padding: 9px 0;
            border-bottom: 1px solid #f8f8f8;
            color: #2c3e50;
        }
        .estado-pill {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .pill-ok       { background: #d4f8e8; color: #1a7a4a; }
        .pill-bajo     { background: #fff3cd; color: #856404; }
        .pill-critico  { background: #fde8e8; color: #c0392b; }

        /* ---- NOTIFICACIONES PEDIDOS ---- */
        .notif-lista { display: flex; flex-direction: column; gap: 10px; }

        .notif-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 12px;
            border-radius: 10px;
            background: #f9fafb;
            border-left: 4px solid #23899e;
        }
        .notif-item.notif-alerta  { border-left-color: #e74c3c; background: #fff8f8; }
        .notif-item.notif-exito   { border-left-color: #27ae60; background: #f4fdf7; }
        .notif-item.notif-warning { border-left-color: #f39c12; background: #fffbf0; }

        .notif-icono { font-size: 20px; min-width: 24px; }

        .notif-body { flex: 1; }
        .notif-titulo { font-size: 13px; font-weight: 700; color: #2c3e50; }
        .notif-desc   { font-size: 12px; color: #888; margin-top: 2px; }
        .notif-hora   { font-size: 11px; color: #bbb; margin-top: 4px; }

        /* ---- ACCESOS RÁPIDOS ---- */
        .accesos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .acceso-btn {
            padding: 14px 10px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            color: #fff;
            text-align: center;
        }
        .acceso-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .acceso-btn:active { transform: translateY(0); }
        .ab-verde  { background: #23899e; }
        .ab-rojo   { background: #e74c3c; }
        .ab-naranja{ background: #f39c12; }
        .ab-gris   { background: #185f62; }

        /* ---- TOPBAR mejorado ---- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .topbar-left h1 { font-size: 22px; font-weight: 700; color: #2c3e50; margin: 0; }
        .topbar-sub { font-size: 13px; color: #aaa; margin-top: 2px; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .notif-btn {
            position: relative;
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .badge {
            position: absolute;
            top: -4px; right: -6px;
            background: #e74c3c;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .topbar-usuario {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 13px;
        }
        .topbar-usuario strong { color: #2c3e50; }
        .topbar-usuario a { color: #23899e; text-decoration: none; font-size: 12px; }
        .btn-salir {
            background: #e74c3c;
            color: #fff;
            padding: 7px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: background 0.2s;
        }
        .btn-salir:hover { background: #c0392b; }

        /* sidebar.css maneja todos los estilos del menú lateral */

        /* ---- RESPONSIVE ---- */
        @media (max-width: 1100px) {
            .cards { grid-template-columns: repeat(2, 1fr); }
            .accesos-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .dash-grid { grid-template-columns: 1fr; }
            .cards { grid-template-columns: 1fr 1fr; }
            }
   
    </style>
</head>
<body>

    <div> class="dashboard-container">
        
        //SIDEBAR //
<aside> class="sidebar">

    <div> class="sidebar-header">
        <img
        src="img/logo.png.png"
        alt="Yogur Natural Fruits"
        class="sidebar-logo"
        onerror="this.style.display='none'; document.getElementById('logo-logo-fallback').style.display='block';"
>


    </div>


</aside>

    </div>
    
</body>
</html>
